site_name: PrismLang
site_description: Deterministic Vector Language Protocol for Multi-Agent AI Orchestration
site_author: Amin Parva / Insight IT Solutions LLC
site_url: https://www.insightits.com/prismlang
repo_url: https://github.com/insightits/prismlang
repo_name: insightits/prismlang
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            heading_level: 2
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Core Concepts:
      - Protocol Overview: concepts/protocol.md
      - Tenant Isolation: concepts/isolation.md
      - Taxonomy Design: concepts/taxonomy.md
  - API Reference:
      - PrismProjector: api/projector.md
      - TaxonomyConfig: api/taxonomy.md
      - Middleware: api/middleware.md
      - Checkpointers: api/checkpointers.md
      - Exceptions: api/exceptions.md
  - Architecture: ARCHITECTURE.md
  - Benchmarks: BENCHMARK.md
  - Security: SECURITY.md
  - Contributing: ../CONTRIBUTING.md
  - Changelog: ../CHANGELOG.md
  - Release Checklist: RELEASE_CHECKLIST.md
